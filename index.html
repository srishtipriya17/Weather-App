<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mainBox">
    <img src="">
    <h1>Weather</h1>
    <h2>ForeCasts</h2>
    <button>Start</button>
  </div>


  <div class="mainBox">

    <div>
      <input type="text" class="text" placeholder="Enter your city" id="inputfield">
       <img src="" id="SearchIcon">
  </div>

  <div class="iconBox">
   < img src="" id="icon">
   <p>description</p>
  </div>

  <div class="tempBox">
    <h1 id="temp">0°c</h1>
    <h3 id="city">New York</h3>
  </div>
      
  <div class="extraDetails">

    <div class="wind">
      <img src="" id="windIcon">
      <div class="windData">
        <p id="windSpeed">0km/h</p>
        <p>wind</p>
      </div>
    </div>

    <div class="humidity">
      <img src="" id="humidityIcon">
      <div class="humidityData">
        <p id="humidityper">%</p>
        <p>humidity</p>
      </div>
    </div>


  </div>
  </div>


  <div class="mainBox"></div>

  <script src="app.js"></script>
</body>
</html>
