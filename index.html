<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">




</head>
<body>

  <div class="mainBox">
    <img src="images/images.png">
    
    <h1 class="weather">Weather</h1>
    <h2 class="ForeCasts">ForeCasts</h2>
    <button class="start">Get Start</button>
  </div>


  <div class="mainBox">

    <div>
      <input type="text" class="text" placeholder="Enter your city" id="inputfield">
       <img src="images/search.png" id="SearchIcon">
  </div>

  <div class="iconBox">
   < img src="images/sun.png" id="icon">
   <p>description</p>
  </div>

  <div class="tempBox">
    <h1 id="temp">0°c</h1>
    <h3 id="city">New York</h3>
  </div>
      
  <div class="extraDetails">

    <div class="wind">
      <img src="images/wind.png" id="windIcon">
      <div class="windData">
        <p id="windSpeed">0km/h</p>
        <p>wind</p>
      </div>
    </div>

    <div class="humidity">
      <img src="images/humidity.png" id="humidityIcon">
      <div class="humidityData">
        <p id="humidityper">%</p>
        <p>humidity</p>
      </div>
    </div>


  </div>
  </div>


  <div class="mainBox"> 

    <h1>404</h1>
    <p>Oops! Page Not Found</p>
    <p id="info"> The page you're looking for dosen't exists or has been moved </p>
    <button>Go Home</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
